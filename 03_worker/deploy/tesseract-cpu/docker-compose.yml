# OCR Worker - Tesseract (CPU-only, lightweight)
#
# Prerequisites: build base image first
#   cd 03_worker && make build-base-cpu
#
# Usage (from project root):
#   docker-compose -f 03_worker/deploy/tesseract-cpu/docker-compose.yml up -d
#   docker-compose -f 03_worker/deploy/tesseract-cpu/docker-compose.yml up -d --scale worker-tesseract=3
#   docker-compose -f 03_worker/deploy/tesseract-cpu/docker-compose.yml down

services:
  worker-tesseract:
    build:
      context: ../..
      dockerfile: deploy/tesseract-cpu/Dockerfile
    image: ocr-worker-tesseract:latest
    env_file:
      - ../../../.env
      - .env
    stop_grace_period: 60s
    networks:
      - ocr-network

networks:
  ocr-network:
    external: true
    name: ocr-network
