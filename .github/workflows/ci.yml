name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      minio:
        image: minio/minio:latest
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
      nats:
        image: nats:latest
        ports:
          - 4222:4222
        options: >-
          --health-cmd "wget --spider http://localhost:8222/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: 02_backend/requirements.txt

      - name: Install dependencies
        run: pip install -r 02_backend/requirements.txt && pip install pytest pytest-asyncio httpx

      - name: Run backend tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          MINIO_ENDPOINT: "localhost:9000"
          MINIO_ACCESS_KEY: "minioadmin"
          MINIO_SECRET_KEY: "minioadmin"
          NATS_URL: "nats://localhost:4222"
          SECRET_KEY: "test-secret-key"
        run: python -m pytest 00_test/backend/ -v --tb=short

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: 01_frontend/package-lock.json

      - name: Install dependencies
        working-directory: 01_frontend
        run: npm ci

      - name: Type check
        working-directory: 01_frontend
        run: npx tsc --noEmit

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
