<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OCR-Local-MVP Login</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "primary-hover": "#1d6bf3",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                        "card-dark": "#1c2333",
                        "card-light": "#ffffff",
                        "input-border-dark": "#3b4354",
                        "input-border-light": "#e5e7eb",
                        "input-bg-dark": "#1c1f27",
                        "input-bg-light": "#f9fafb",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Container / Card -->
<div class="w-full max-w-[480px] bg-card-light dark:bg-card-dark rounded-xl shadow-xl border border-gray-200 dark:border-gray-800 overflow-hidden relative">
<!-- Decorative subtle gradient top border -->
<div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary via-blue-400 to-primary"></div>
<div class="p-8 sm:p-10 flex flex-col gap-6">
<!-- Header Section -->
<div class="flex flex-col gap-2 text-center pb-2">
<h1 class="text-gray-900 dark:text-white text-3xl font-black leading-tight tracking-[-0.033em]">
                    OCR-Local-MVP
                </h1>
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal">
                    Sign in to access local tools
                </p>
</div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-gray-900 dark:text-white text-sm font-medium leading-normal" for="email">
                        Email Address
                    </label>
<div class="relative">
<input class="form-input block w-full rounded-lg border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark text-gray-900 dark:text-white h-12 px-4 text-base placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="dev@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-gray-900 dark:text-white text-sm font-medium leading-normal" for="password">
                            Password
                        </label>
</div>
<div class="relative flex items-center">
<input class="form-input block w-full rounded-lg border border-input-border-light dark:border-input-border-dark bg-input-bg-light dark:bg-input-bg-dark text-gray-900 dark:text-white h-12 px-4 pr-12 text-base placeholder:text-gray-400 focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" minlength="6" name="password" placeholder="••••••" required="" type="password"/>
<button class="absolute right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 focus:outline-none flex items-center justify-center" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
<p class="text-xs text-gray-500 dark:text-gray-500 mt-1">Must be at least 6 characters.</p>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full flex items-center justify-center rounded-lg h-12 bg-primary hover:bg-primary-hover text-white text-base font-bold leading-normal transition-all shadow-md hover:shadow-lg focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-background-dark" type="submit">
                        Sign In
                    </button>
</div>
</form>
<!-- Footer / Register Link -->
<div class="border-t border-gray-200 dark:border-gray-800 pt-6">
<p class="text-gray-500 dark:text-gray-400 text-sm font-normal leading-normal text-center">
                    Don't have access? 
                    <a class="text-primary hover:text-primary-hover hover:underline font-medium transition-colors" href="#">
                        Register
                    </a>
</p>
</div>
</div>
</div>
<!-- Abstract subtle background element for visual interest -->
<div class="fixed bottom-0 right-0 p-10 opacity-5 dark:opacity-5 pointer-events-none select-none">
<span class="material-symbols-outlined text-[300px] text-gray-500">terminal</span>
</div>
</body></html>
